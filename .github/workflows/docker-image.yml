name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Mihomo version without leading v. Leave blank to use the v* ref or the default."
        required: false
        type: string
      push_image:
        description: "Push the image to GitHub Container Registry."
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_MIHOMO_VERSION: "1.19.27"
  IMAGE_NAME: ghcr.io/ripples-alive/mihomo
  PLATFORMS: linux/amd64

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            mihomo_tag: ""
            tag_suffix: ""
          - variant: compatible
            mihomo_tag: compatible
            tag_suffix: "-compatible"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build settings
        id: build
        shell: bash
        env:
          INPUT_PUSH_IMAGE: ${{ github.event.inputs.push_image }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION}"
          if [ -z "$version" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
              version="${GITHUB_REF_NAME#v}"
            else
              version="${DEFAULT_MIHOMO_VERSION}"
            fi
          fi
          version="${version#v}"

          push_image="true"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            push_image="false"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_PUSH_IMAGE}" = "false" ]; then
            push_image="false"
          fi

          {
            echo "version=${version}"
            echo "push_image=${push_image}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${version}${{ matrix.tag_suffix }}"
            if [ "${{ matrix.variant }}" = "standard" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.build.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          pull: true
          push: ${{ steps.build.outputs.push_image == 'true' }}
          build-args: |
            MIHOMO_VERSION=${{ steps.build.outputs.version }}
            MIHOMO_TAG=${{ matrix.mihomo_tag }}
          tags: ${{ steps.build.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.build.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Mihomo Docker image
          cache-from: type=gha
          cache-to: type=gha,mode=max
